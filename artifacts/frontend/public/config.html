<!DOCTYPE html>
<html lang="en" class="theme-glass">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AFK Bot — Configuration</title>
<link rel="stylesheet" href="/assets/base.css">
<link rel="stylesheet" href="/assets/glass.css">
<script>window.API_BASE = '/api';</script>
</head>
<body>
<div class="app-container">
  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="/dashboard.html" class="nav-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="nav-title">Configuration</div>
    <div style="width:36px;"></div>
  </nav>

  <div class="page-content">
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- Login Section -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        </div>
        <div>
          <div class="section-title">Login Settings</div>
          <div class="section-sub">URLs and authentication</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Login URL</label>
        <input type="url" id="loginUrl" class="form-input" placeholder="https://..." value="">
      </div>
      <div class="form-group">
        <label class="form-label">Target URL</label>
        <input type="url" id="targetUrl" class="form-input" placeholder="https://..." value="">
      </div>
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input type="text" id="username" class="form-input" placeholder="your@email.com" value="" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-pw-wrap">
          <input type="password" id="password" class="form-input" placeholder="Enter new password to change" autocomplete="off">
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">
            <svg id="pwEyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="pwEyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="saveCredentials">Save Credentials</button>
    </div>

    <!-- Screenshot Interval -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </div>
        <div>
          <div class="section-title">Screenshot Interval</div>
          <div class="section-sub">Live preview refresh rate</div>
        </div>
      </div>
      <div class="form-group">
        <div class="slider-header">
          <label class="form-label">Interval</label>
          <span class="slider-value" id="intervalDisplay">1000 ms</span>
        </div>
        <input type="range" id="screenshotInterval" class="form-slider" min="100" max="5000" step="100" value="1000">
        <div class="slider-labels">
          <span>100ms (fastest)</span>
          <span>5000ms</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Or enter exact value (ms)</label>
        <input type="number" id="intervalExact" class="form-input" min="100" max="60000" step="100" value="1000" placeholder="100–60000">
      </div>
      <button class="btn btn-secondary btn-full" id="saveConfig">Save Settings</button>
    </div>

    <!-- Proxy Section -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
        </div>
        <div style="flex:1">
          <div class="section-title">Proxy Settings</div>
          <div class="section-sub">Oxylabs datacenter proxy</div>
        </div>
        <label class="toggle-switch" title="Enable proxy">
          <input type="checkbox" id="proxyEnabled">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div id="proxyFields" style="display:none">
        <div class="proxy-row">
          <div class="form-group" style="flex:2">
            <label class="form-label">Proxy Host</label>
            <input type="text" id="proxyHost" class="form-input" value="dc.oxylabs.io" placeholder="dc.oxylabs.io">
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">Port</label>
            <input type="number" id="proxyPort" class="form-input" value="8000" min="1" max="65535" placeholder="8000">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country Code</label>
          <input type="text" id="proxyCountry" class="form-input" value="US" maxlength="2" placeholder="US" style="text-transform:uppercase">
          <div class="form-hint">2-letter ISO code (e.g. US, GB, DE)</div>
        </div>
        <div class="form-group">
          <label class="form-label">Proxy Username</label>
          <input type="text" id="proxyUsername" class="form-input" placeholder="your_proxy_user" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">Proxy Password</label>
          <div class="input-pw-wrap">
            <input type="password" id="proxyPassword" class="form-input" placeholder="Enter new password to change" autocomplete="off">
            <button type="button" class="pw-toggle" id="proxyPwToggle" aria-label="Toggle proxy password">
              <svg id="proxyEyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="proxyEyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="proxy-preview">
          <span class="proxy-preview-label">Effective user:</span>
          <code class="proxy-preview-val" id="proxyPreview">user-username-country-US</code>
        </div>
      </div>
      <button class="btn btn-secondary btn-full" id="saveProxy">Save Proxy</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="/config.html" class="bottom-nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Config</span>
    </a>
  </nav>
</div>

<script>
const API = window.API_BASE;

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2800);
}

let _savedPassword = '';

async function loadCredentials() {
  try {
    const r = await fetch(API + '/credentials');
    const d = await r.json();
    document.getElementById('loginUrl').value = d.loginUrl || '';
    document.getElementById('targetUrl').value = d.targetUrl || '';
    document.getElementById('username').value = d.username || '';
    _savedPassword = d.password || '';
    document.getElementById('password').value = '';
    document.getElementById('password').placeholder = _savedPassword ? 'Password saved — enter new to change' : 'Enter password';
  } catch(e) {}
}

let _savedProxyPassword = '';

async function loadConfig() {
  try {
    const r = await fetch(API + '/config');
    const d = await r.json();
    const iv = d.screenshotInterval || 1000;
    document.getElementById('screenshotInterval').value = iv;
    document.getElementById('intervalExact').value = iv;
    document.getElementById('intervalDisplay').textContent = iv + ' ms';

    const proxy = d.proxy || {};
    const enabled = !!proxy.enabled;
    document.getElementById('proxyEnabled').checked = enabled;
    document.getElementById('proxyFields').style.display = enabled ? 'block' : 'none';
    document.getElementById('proxyHost').value = proxy.host || 'dc.oxylabs.io';
    document.getElementById('proxyPort').value = proxy.port || 8000;
    document.getElementById('proxyCountry').value = (proxy.country || 'US').toUpperCase();
    document.getElementById('proxyUsername').value = proxy.username || '';
    _savedProxyPassword = proxy.password || '';
    document.getElementById('proxyPassword').value = '';
    document.getElementById('proxyPassword').placeholder = _savedProxyPassword ? 'Password saved — enter new to change' : 'Enter proxy password';
    updateProxyPreview();
  } catch(e) {}
}

function updateProxyPreview() {
  const u = document.getElementById('proxyUsername').value || 'username';
  const c = (document.getElementById('proxyCountry').value || 'US').toUpperCase();
  document.getElementById('proxyPreview').textContent = `user-${u}-country-${c}`;
}

document.getElementById('screenshotInterval').addEventListener('input', function() {
  const v = parseInt(this.value);
  document.getElementById('intervalDisplay').textContent = v + ' ms';
  document.getElementById('intervalExact').value = v;
});
document.getElementById('intervalExact').addEventListener('input', function() {
  const v = Math.max(100, parseInt(this.value) || 100);
  if (v <= 5000) document.getElementById('screenshotInterval').value = v;
  document.getElementById('intervalDisplay').textContent = v + ' ms';
});

document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  document.getElementById('pwEyeOpen').style.display = isHidden ? 'none' : '';
  document.getElementById('pwEyeOff').style.display = isHidden ? '' : 'none';
});

document.getElementById('saveCredentials').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const typedPassword = document.getElementById('password').value;
    const body = {
      loginUrl: document.getElementById('loginUrl').value,
      targetUrl: document.getElementById('targetUrl').value,
      username: document.getElementById('username').value,
      password: typedPassword || _savedPassword,
    };
    const r = await fetch(API + '/credentials', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.ok) {
      showToast('Credentials saved!', true);
      if (typedPassword) {
        _savedPassword = typedPassword;
        document.getElementById('password').value = '';
        document.getElementById('password').placeholder = 'Password saved — enter new to change';
      }
    } else showToast('Failed to save.', false);
  } catch(e) {
    showToast('Network error.', false);
  }
  btn.disabled = false;
  btn.textContent = 'Save Credentials';
});

document.getElementById('saveConfig').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const screenshotInterval = parseInt(document.getElementById('intervalExact').value) || 1000;
    const body = { screenshotInterval: Math.max(100, screenshotInterval) };
    const r = await fetch(API + '/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.ok) showToast('Settings saved!', true);
    else showToast('Failed to save.', false);
  } catch(e) {
    showToast('Network error.', false);
  }
  btn.disabled = false;
  btn.textContent = 'Save Settings';
});

document.getElementById('proxyEnabled').addEventListener('change', function() {
  document.getElementById('proxyFields').style.display = this.checked ? 'block' : 'none';
});

document.getElementById('proxyUsername').addEventListener('input', updateProxyPreview);
document.getElementById('proxyCountry').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
  updateProxyPreview();
});

document.getElementById('proxyPwToggle').addEventListener('click', function() {
  const inp = document.getElementById('proxyPassword');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  document.getElementById('proxyEyeOpen').style.display = isHidden ? 'none' : '';
  document.getElementById('proxyEyeOff').style.display = isHidden ? '' : 'none';
});

document.getElementById('saveProxy').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const typedPw = document.getElementById('proxyPassword').value;
    const body = {
      proxy: {
        enabled: document.getElementById('proxyEnabled').checked,
        host: document.getElementById('proxyHost').value,
        port: parseInt(document.getElementById('proxyPort').value) || 8000,
        country: document.getElementById('proxyCountry').value.toUpperCase(),
        username: document.getElementById('proxyUsername').value,
        password: typedPw || _savedProxyPassword,
      }
    };
    const r = await fetch(API + '/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.ok) {
      showToast('Proxy settings saved!', true);
      if (typedPw) {
        _savedProxyPassword = typedPw;
        document.getElementById('proxyPassword').value = '';
        document.getElementById('proxyPassword').placeholder = 'Password saved — enter new to change';
      }
    } else showToast('Failed to save.', false);
  } catch(e) {
    showToast('Network error.', false);
  }
  btn.disabled = false;
  btn.textContent = 'Save Proxy';
});

loadCredentials();
loadConfig();
</script>
</body>
</html>
